name: Build Windows EXE

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Windows EXE
        run: npm run dist

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: win-todo-reminder-setup
          path: dist/*.exe
          retention-days: 30

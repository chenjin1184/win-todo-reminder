<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357abd;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#grad)"/>
  <g transform="translate(128,128)">
    <!-- 复选框 -->
    <rect x="-60" y="-80" width="120" height="120" rx="12" fill="none" stroke="white" stroke-width="10"/>
    <!-- 勾号 -->
    <polyline points="-35,-20 -10,10 40,-40" fill="none" stroke="white" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- 时钟圆圈 -->
    <circle cx="40" cy="50" r="35" fill="none" stroke="white" stroke-width="8"/>
    <!-- 时钟指针 -->
    <line x1="40" y1="50" x2="40" y2="30" stroke="white" stroke-width="7" stroke-linecap="round"/>
    <line x1="40" y1="50" x2="55" y2="55" stroke="white" stroke-width="7" stroke-linecap="round"/>
  </g>
</svg>
